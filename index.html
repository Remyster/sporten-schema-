<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Gym Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--s3:#242424;--br:#272727;--tx:#e2e2e2;--mu:#555;--ac:#e8ff00;--teal:#4ecdc4;--pu:#a78bfa;--am:#f59e0b;--co:#ff6b6b;--gr:#6fcf97}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overscroll-behavior:none}
.app{max-width:660px;margin:0 auto;padding:0 0 80px}

/* HEADER */
.hdr{padding:12px 14px 10px;border-bottom:1px solid var(--br);background:var(--bg);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac)}
.sub{font-size:10px;color:var(--mu)}
.tabs{display:flex;gap:4px}
.tab{flex:1;padding:7px 4px;text-align:center;border:1px solid var(--br);border-radius:7px;cursor:pointer;background:var(--s1);color:var(--mu);font-size:10px;transition:all .15s;user-select:none}
.tab b{display:block;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--tx)}
.tab.active{background:var(--ac);border-color:var(--ac)}
.tab.active,.tab.active b{color:#000}
.prog-wrap{padding:8px 14px 0}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--mu);margin-bottom:4px}
.prog-bar{height:2px;background:var(--br);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}

/* DAY */
.day{display:none;padding:10px 14px 0}
.day.active{display:block}
.day-hdr{margin-bottom:9px}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.day-focus{font-size:10px;color:var(--mu)}

/* EXERCISE CARD */
.card{background:var(--s1);border:1px solid var(--br);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:opacity .2s}
.card.done{opacity:.45}
.card-top{display:flex}

/* EXERCISE ILLUSTRATION */
.ex-il{width:68px;flex-shrink:0;background:var(--s2);border-right:1px solid var(--br);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;gap:3px}
.ex-il svg{width:54px;height:62px}
.ex-type-badge{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);text-align:center}

/* CARD INFO */
.ci{flex:1;padding:9px 10px;min-width:0}
.ci-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.ex-name{font-weight:600;font-size:12px;line-height:1.2}
.ex-mus{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.ci-btns{display:flex;gap:4px;flex-shrink:0}
.ic-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--br);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mu);transition:all .15s}
.ic-btn:hover{border-color:#555;color:var(--tx)}
.ic-btn.done-btn.on{background:var(--ac);border-color:var(--ac);color:#000}

.warn{display:inline-flex;align-items:center;gap:3px;background:#1f1500;border:1px solid #3d2800;border-radius:4px;padding:1px 5px;font-size:9px;color:var(--am);margin-bottom:5px}

/* SET TABLE */
.set-table{width:100%;margin-bottom:6px}
.set-head{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;margin-bottom:3px;padding:0 2px}
.set-head span{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 24px;gap:4px;align-items:center;margin-bottom:3px}
.set-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu);text-align:center}
.set-in{background:var(--s2);border:1px solid var(--br);border-radius:5px;padding:4px 4px;font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);width:100%;text-align:center;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.set-in::-webkit-inner-spin-button,.set-in::-webkit-outer-spin-button{-webkit-appearance:none}
.set-in:focus{border-color:var(--ac)}
.set-in.done-set{border-color:#2a3a2a;background:#111;color:#555}
.set-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--br);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.set-chk.on{background:var(--ac);border-color:var(--ac);color:#000}

/* BOTTOM ACTIONS */
.card-actions{display:flex;align-items:center;gap:5px;padding:4px 10px 8px;flex-wrap:wrap}
.act-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--br);background:var(--s2);color:var(--mu);transition:all .15s;white-space:nowrap}
.act-btn:hover{color:var(--tx);border-color:#444}
.timer-btn{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid #3a5500;background:#1a2a00;color:var(--ac);transition:all .15s;white-space:nowrap}
.timer-btn.running{background:#2a1500;border-color:#5a3000;color:var(--am)}
.timer-btn.urgent{background:#2a0000;border-color:#5a0000;color:var(--co);animation:pulse .5s infinite alternate}
.timer-btn.done-t{background:#0a2a0a;border-color:#1a5a1a;color:var(--gr)}
.swap-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid #2a2a4a;background:#121224;color:#8888cc;transition:all .15s}
.swap-btn:hover{border-color:#4a4aaa;color:#aaaaff}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

/* NOTES & COMMENT */
.nt-body{padding:6px 10px 4px;font-size:11px;color:#888;line-height:1.6;border-top:1px solid var(--br);display:none}
.nt-body.open{display:block}
.comment-in{width:100%;background:transparent;border:none;border-top:1px solid var(--br);padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:11px;color:#888;resize:none;outline:none;line-height:1.4;min-height:28px;overflow:hidden}
.comment-in:focus{color:var(--tx)}
.comment-in::placeholder{color:#333}

/* CARDIO */
.cardio{background:#0a190a;border:1px solid #1d3a1d;border-radius:10px;padding:10px 13px;margin-top:8px;display:flex;align-items:center;gap:10px}
.cardio-ic{font-size:18px;flex-shrink:0}
.cardio-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gr);font-weight:600;margin-bottom:1px}
.cardio-tx{color:#aaa;font-size:11px}

/* TIMER OVERLAY */
.timer-ov{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:2px solid var(--br);border-radius:14px;padding:12px 22px;z-index:200;text-align:center;min-width:160px;box-shadow:0 6px 32px #000c}
.timer-ov.show{display:block}
.t-big{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:2px;line-height:1;color:var(--ac);transition:color .3s}
.t-big.urg{color:var(--co)}
.t-big.klaar{color:var(--gr)}
.t-lbl{font-size:10px;color:var(--mu);margin-top:1px}
.t-stop{margin-top:7px;font-size:10px;color:var(--mu);cursor:pointer;background:none;border:none;text-decoration:underline}

/* DB MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#000a;z-index:100}
.modal-bg.show{display:block}
.modal{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--s1);border-radius:16px 16px 0 0;z-index:101;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.modal.show{transform:translateY(0)}
.modal-hdr{padding:12px 16px 8px;border-bottom:1px solid var(--br);flex-shrink:0}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.modal-sub{font-size:10px;color:var(--mu)}
.modal-close{position:absolute;top:12px;right:14px;font-size:18px;cursor:pointer;color:var(--mu);background:none;border:none;line-height:1}
.cat-tabs{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;flex-shrink:0;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--br);font-size:10px;cursor:pointer;background:var(--s2);color:var(--mu);transition:all .15s;white-space:nowrap}
.cat-tab.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:600}
.ex-list{overflow-y:auto;flex:1;padding:6px 14px 20px}
.ex-db-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);cursor:pointer;transition:background .15s}
.ex-db-item:hover .ex-db-name{color:var(--ac)}
.ex-db-il{width:40px;height:40px;flex-shrink:0;background:var(--s2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.ex-db-il svg{width:34px;height:34px}
.ex-db-name{font-size:13px;font-weight:500}
.ex-db-meta{font-size:10px;color:var(--mu)}
.ex-db-item.current .ex-db-name{color:var(--ac)}
.ex-db-item.current{background:#1a1a00;margin:0 -14px;padding:10px 14px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-row"><div class="logo">GYM LOG</div><div class="sub">sets · reps · notities opgeslagen</div></div>
  <div class="tabs">
    <div class="tab active" onclick="sw(0)"><b>MA</b>Pull+Armen</div>
    <div class="tab" onclick="sw(1)"><b>WO</b>Push+Armen</div>
    <div class="tab" onclick="sw(2)"><b>VR</b>Full Body</div>
  </div>
</div>
<div class="prog-wrap">
  <div class="prog-row"><span id="pt">0 / 0 sets gedaan</span><span id="pp">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
</div>
<div id="d0" class="day active"></div>
<div id="d1" class="day"></div>
<div id="d2" class="day"></div>
</div>

<div class="timer-ov" id="tOv">
  <div class="t-big" id="tBig">40</div>
  <div class="t-lbl" id="tLbl">seconden rust</div>
  <button class="t-stop" onclick="cancelTimer()">annuleer</button>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-hdr">
    <div class="modal-title">Oefening wisselen</div>
    <div class="modal-sub" id="modalSub">Kies een vervanging</div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="ex-list" id="exList"></div>
</div>

<script>
// ── EXERCISE ILLUSTRATIONS ──────────────────────────────────
const MC={back:'#4ecdc4',lats:'#4ecdc4',rotator:'#e8ff00',shoulder:'#e8ff00',rearDelt:'#e8ff00',bicep:'#a78bfa',tricep:'#f59e0b',chest:'#ff6b6b',quads:'#6fcf97',hamstrings:'#6fcf97',core:'#f97316'};

function exSvg(type, muscle, small=false){
  const c=MC[muscle]||'#888';
  const vb=small?'0 0 80 80':'0 0 80 80';
  const sk='#2e2e2e', sw=2, sw2=1.5;
  // Arrow helper
  const arr=`<defs><marker id="a${muscle.slice(0,3)}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="${c}"/></marker></defs>`;

  const poses={
    curl:`${arr}
      <circle cx="40" cy="11" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="18" x2="40" y2="47" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="24" y1="26" x2="56" y2="26" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="24" y1="26" x2="20" y2="47" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="56" y1="26" x2="60" y2="44" stroke="${c}" stroke-width="${sw}"/>
      <line x1="60" y1="44" x2="53" y2="27" stroke="${c}" stroke-width="${sw}"/>
      <rect x="47" y="23" width="12" height="3" rx="1.5" fill="${c}" opacity=".8"/>
      <line x1="32" y1="47" x2="48" y2="47" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="35" y1="47" x2="30" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="45" y1="47" x2="50" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M64 40 Q70 33 64 26" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    pushdown:`${arr}
      <circle cx="40" cy="11" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="18" x2="40" y2="47" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="24" y1="26" x2="56" y2="26" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="24" y1="26" x2="20" y2="47" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="56" y1="26" x2="59" y2="43" stroke="${c}" stroke-width="${sw}"/>
      <line x1="59" y1="43" x2="55" y2="58" stroke="${c}" stroke-width="${sw}"/>
      <rect x="48" y="55" width="14" height="3" rx="1.5" fill="${c}" opacity=".8"/>
      <line x1="32" y1="47" x2="48" y2="47" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="35" y1="47" x2="30" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="45" y1="47" x2="50" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M63 46 L63 58" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    row:`${arr}
      <circle cx="25" cy="20" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="25" y1="27" x2="32" y2="50" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="17" y1="34" x2="33" y2="34" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="33" y1="34" x2="55" y2="30" stroke="${c}" stroke-width="${sw}"/>
      <rect x="52" y="26" width="14" height="4" rx="2" fill="${c}" opacity=".7"/>
      <line x1="17" y1="34" x2="10" y2="54" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="30" y1="50" x2="25" y2="70" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="34" y1="50" x2="40" y2="70" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M58 30 L46 30" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    pulldown:`${arr}
      <circle cx="40" cy="14" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="21" x2="40" y2="50" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="20" y1="10" x2="60" y2="10" stroke="${c}" stroke-width="${sw}"/>
      <line x1="20" y1="10" x2="26" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="60" y1="10" x2="54" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="24" y1="29" x2="56" y2="29" stroke="${c}" stroke-width="${sw2}"/>
      <line x1="30" y1="50" x2="24" y2="70" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="50" y1="50" x2="56" y2="70" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M40 8 L40 19" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    press:`${arr}
      <circle cx="40" cy="65" r="6" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="59" x2="40" y2="38" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="46" x2="58" y2="46" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="22" y1="46" x2="16" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="58" y1="46" x2="64" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="10" y1="26" x2="70" y2="26" stroke="${c}" stroke-width="${sw}"/>
      <path d="M22 42 L22 30" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    lateral:`${arr}
      <circle cx="40" cy="11" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="18" x2="40" y2="47" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="24" y1="26" x2="56" y2="26" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="24" y1="26" x2="12" y2="40" stroke="${c}" stroke-width="${sw}"/>
      <line x1="56" y1="26" x2="68" y2="40" stroke="${c}" stroke-width="${sw}"/>
      <circle cx="10" cy="40" r="3" fill="${c}" opacity=".7"/>
      <circle cx="70" cy="40" r="3" fill="${c}" opacity=".7"/>
      <line x1="32" y1="47" x2="48" y2="47" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="35" y1="47" x2="30" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="45" y1="47" x2="50" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M18 34 L10 42" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    deadlift:`${arr}
      <circle cx="28" cy="20" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="28" y1="27" x2="36" y2="52" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="18" y1="36" x2="38" y2="36" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="38" y1="36" x2="52" y2="54" stroke="${c}" stroke-width="${sw}"/>
      <line x1="18" y1="36" x2="12" y2="56" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="33" y1="52" x2="28" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="39" y1="52" x2="45" y2="72" stroke="${sk}" stroke-width="${sw2}"/>
      <rect x="44" y="52" width="20" height="5" rx="2.5" fill="${c}" opacity=".7"/>
      <circle cx="44" cy="54" r="5" fill="none" stroke="${c}" stroke-width="1.5"/>
      <circle cx="64" cy="54" r="5" fill="none" stroke="${c}" stroke-width="1.5"/>
      <path d="M40 50 L28 28" fill="none" stroke="${c}" stroke-width="1.2" stroke-dasharray="3,3"/>`,

    squat:`${arr}
      <circle cx="40" cy="10" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="17" x2="40" y2="40" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="24" x2="58" y2="24" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="22" y1="24" x2="15" y2="40" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="58" y1="24" x2="65" y2="40" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="30" y1="40" x2="50" y2="40" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="33" y1="40" x2="20" y2="60" stroke="${c}" stroke-width="${sw}"/>
      <line x1="20" y1="60" x2="15" y2="72" stroke="${c}" stroke-width="${sw}"/>
      <line x1="47" y1="40" x2="60" y2="60" stroke="${c}" stroke-width="${sw}"/>
      <line x1="60" y1="60" x2="65" y2="72" stroke="${c}" stroke-width="${sw}"/>
      <path d="M40 44 L40 30" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    legcurl:`${arr}
      <circle cx="20" cy="28" r="6" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="20" y1="34" x2="44" y2="44" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="12" y1="40" x2="28" y2="40" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="12" y1="40" x2="8" y2="56" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="44" y1="44" x2="60" y2="44" stroke="${c}" stroke-width="${sw}"/>
      <line x1="60" y1="44" x2="66" y2="30" stroke="${c}" stroke-width="${sw}"/>
      <circle cx="68" cy="28" r="4" fill="${c}" opacity=".7"/>
      <path d="M62 42 L66 32" fill="none" stroke="${c}" stroke-width="1.5" marker-end="url(#a${muscle.slice(0,3)})"/>`,

    rotation:`${arr}
      <circle cx="40" cy="11" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="18" x2="40" y2="47" stroke="${sk}" stroke-width="${sw}"/>

// ── TIMER ────────────────────────────────────────────────────
function startTimer(exId){
  if(tIv&&tExId===exId){cancelTimer();return}
  cancelTimer();
  tExId=exId;tSec=TSEC;
  setTBtn(exId,'run');showOv();
  tIv=setInterval(()=>{
    tSec--;
    setTBtn(exId,tSec>0?(tSec<=10?'urg':'run'):'done');
    showOv();
    if(tSec<=0){
      clearInterval(tIv);tIv=null;
      if(navigator.vibrate)navigator.vibrate([300,100,300]);
      setTimeout(()=>{document.getElementById('tOv').classList.remove('show');setTBtn(exId,'idle');tExId=null},2200);
    }
  },1000);
}
function cancelTimer(){
  if(tIv){clearInterval(tIv);tIv=null}
  document.getElementById('tOv').classList.remove('show');
  if(tExId){setTBtn(tExId,'idle');tExId=null}
}
function showOv(){
  const ov=document.getElementById('tOv'),big=document.getElementById('tBig'),lbl=document.getElementById('tLbl');
  ov.classList.add('show');
  if(tSec<=0){big.textContent='GO!';big.className='t-big klaar';lbl.textContent='rust klaar!';ov.style.borderColor='var(--gr)'}
  else{big.textContent=tSec;big.className='t-big'+(tSec<=10?' urg':'');lbl.textContent='seconden rust';ov.style.borderColor=tSec<=10?'var(--co)':'var(--br)'}
}
function setTBtn(id,state){
  const b=document.getElementById('tbtn-'+id);if(!b)return;
  b.className='timer-btn'+(state==='run'?' running':state==='urg'?' running urgent':state==='done-t'?' done-t':'');
  b.textContent=state==='idle'?'⏱ 40s':state==='done-t'?'✓ klaar':'⏱ '+tSec+'s';
}

// ── RENDER ───────────────────────────────────────────────────
function renderAll(){DAYS_RENDER.forEach((d,i)=>renderDay(i));upd()}

function renderDay(di){
  const day=routine[di];
  const el=document.getElementById('d'+di);
  let h=`<div class="day-hdr"><div class="day-title">${day.title}</div><div class="day-focus">${day.focus}</div></div>`;
  day.exercises.forEach((exId,pos)=>{
    const ex=EXMAP[exId];if(!ex)return;
    h+=renderCard(ex,di,pos);
  });
  h+=`<div class="cardio"><div class="cardio-ic">🔥</div><div><div class="cardio-lbl">Cardio</div><div class="cardio-tx">${day.cardio}</div></div></div>`;
  el.innerHTML=h;
  el.querySelectorAll('.comment-in').forEach(t=>{if(t.value)ar(t)});
}

function renderCard(ex,di,pos){
  const cmt=comments[di+'_'+ex.id]||'';
  const sets=ex.sets;
  let allDone=true;
  let setRows='<div class="set-head"><span>Set</span><span style="text-align:center">Gewicht</span><span style="text-align:center">Reps</span><span></span></div>';
  for(let si=0;si<sets;si++){
    const key=`${di}_${ex.id}_${si}`;
    const sd=setLog[key]||{w:'',r:'',done:false};
    if(!sd.done)allDone=false;
    setRows+=`<div class="set-row">
      <span class="set-num">${si+1}</span>
      <input class="set-in${sd.done?' done-set':''}" type="number" min="0" step="2.5" placeholder="kg" value="${sd.w}" oninput="onSetW('${di}','${ex.id}',${si},this.value)"/>
      <input class="set-in${sd.done?' done-set':''}" type="number" min="0" step="1" placeholder="reps" value="${sd.r}" oninput="onSetR('${di}','${ex.id}',${si},this.value)"/>
      <button class="set-chk${sd.done?' on':''}" onclick="toggleSet('${di}','${ex.id}',${si})">${sd.done?'✓':''}</button>
    </div>`;
  }
  return `<div class="card${allDone?' done':''}" id="card-${di}-${ex.id}">
    <div class="card-top">
      <div class="ex-il">
        ${exSvg(ex.type,ex.muscle)}
        <span class="ex-type-badge">${TYPE_LABEL[ex.type]||ex.type}</span>
      </div>
      <div class="ci">
        <div class="ci-head">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-mus">${ex.ml} · ${ex.sets}×${ex.reps}</div>
          </div>
          <div class="ci-btns">
            <button class="ic-btn done-btn${allDone?' on':''}" onclick="toggleAllSets('${di}','${ex.id}',${ex.sets})" title="Alles afvinken">${allDone?'✓':'○'}</button>
          </div>
        </div>
        ${ex.warn?`<div class="warn">⚠ ${ex.warn}</div>`:''}
        <div class="set-table">${setRows}</div>
      </div>
    </div>
    <div class="card-actions">
      <button class="timer-btn" id="tbtn-${ex.id}" onclick="startTimer('${ex.id}')">⏱ 40s</button>
      <button class="act-btn" onclick="tNt('nt-${di}-${ex.id}',this)">▸ techniek</button>
      <button class="swap-btn" onclick="openSwap(${di},${pos})">↔ wissel</button>
    </div>
    <div class="nt-body" id="nt-${di}-${ex.id}">${ex.notes}</div>
    <textarea class="comment-in" placeholder="Opmerking... (bijv: +2.5kg volgende keer, vorm goed)" rows="1"
      oninput="onCmt('${di}','${ex.id}',this.value);ar(this)" onfocus="ar(this)">${cmt}</textarea>
  </div>`;
}

const DAYS_RENDER=[0,1,2];

// ── INTERACTIONS ─────────────────────────────────────────────
function sw(i){
  cur=i;
  document.querySelectorAll('.day').forEach((d,j)=>d.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  upd();
}

function onSetW(di,exId,si,v){
  const key=`${di}_${exId}_${si}`;
  if(!setLog[key])setLog[key]={w:'',r:'',done:false};
  setLog[key].w=v;saveSets();
}
function onSetR(di,exId,si,v){
  const key=`${di}_${exId}_${si}`;
  if(!setLog[key])setLog[key]={w:'',r:'',done:false};
  setLog[key].r=v;saveSets();
}
function toggleSet(di,exId,si){
  const key=`${di}_${exId}_${si}`;
  if(!setLog[key])setLog[key]={w:'',r:'',done:false};
  setLog[key].done=!setLog[key].done;
  saveSets();
  renderDay(parseInt(di));
  upd();
}
function toggleAllSets(di,exId,sets){
  const ex=EXMAP[exId];
  let allDone=true;
  for(let si=0;si<sets;si++){const k=`${di}_${exId}_${si}`;if(!setLog[k]||!setLog[k].done){allDone=false;break}}
  for(let si=0;si<sets;si++){
    const k=`${di}_${exId}_${si}`;
    if(!setLog[k])setLog[k]={w:'',r:'',done:false};
    setLog[k].done=!allDone;
  }
  saveSets();renderDay(parseInt(di));upd();
}

function onCmt(di,exId,v){comments[di+'_'+exId]=v;saveCmts()}
function tNt(id,btn){const el=document.getElementById(id);el.classList.toggle('open');btn.textContent=el.classList.contains('open')?'▾ techniek':'▸ techniek'}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

function upd(){
  let total=0,done=0;
  routine[cur].exercises.forEach(exId=>{
    const ex=EXMAP[exId];if(!ex)return;
    for(let si=0;si<ex.sets;si++){
      total++;
      const k=`${cur}_${exId}_${si}`;
      if(setLog[k]&&setLog[k].done)done++;
    }
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pt').textContent=`${done} / ${total} sets gedaan`;
  document.getElementById('pp').textContent=`${pct}%`;
  document.getElementById('pf').style.width=`${pct}%`;
}

// ── SWAP MODAL ───────────────────────────────────────────────
function openSwap(di,pos){
  swapTarget={di,pos};
  const curExId=routine[di].exercises[pos];
  const curEx=EXMAP[curExId];
  document.getElementById('modalSub').textContent=`Vervangt: ${curEx?curEx.name:'?'}`;
  // Find what category the current exercise is in
  let startCat='rug';
  Object.entries(DB).forEach(([cat,list])=>{if(list.find(e=>e.id===curExId))startCat=cat});
  activeCat=startCat;
  renderCatTabs();
  renderExList();
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
}
function renderCatTabs(){
  const wrap=document.getElementById('catTabs');
  wrap.innerHTML=Object.entries(CAT_LABELS).map(([k,v])=>
    `<div class="cat-tab${activeCat===k?' active':''}" onclick="setCat('${k}')">${v}</div>`
  ).join('');
}
function setCat(cat){activeCat=cat;renderCatTabs();renderExList()}
function renderExList(){
  const curExId=routine[swapTarget.di].exercises[swapTarget.pos];
  const list=DB[activeCat]||[];
  document.getElementById('exList').innerHTML=list.map(ex=>{
    const isCur=ex.id===curExId;
    return `<div class="ex-db-item${isCur?' current':''}" onclick="doSwap('${ex.id}')">
      <div class="ex-db-il">${exSvg(ex.type,ex.muscle,true)}</div>
      <div>
        <div class="ex-db-name">${ex.name}${isCur?' ✓':''}</div>
        <div class="ex-db-meta">${ex.ml} · ${ex.sets}×${ex.reps}</div>
      </div>
    </div>`;
  }).join('');
}
function doSwap(newExId){
  const {di,pos}=swapTarget;
  routine[di].exercises[pos]=newExId;
  saveRoutine();
  closeModal();
  renderDay(di);
  upd();
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/Bonusbuurt/sw.js'));
load();
renderAll();
</script>
</body>
</html>
