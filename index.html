<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Gym Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--br:#272727;--tx:#e2e2e2;--mu:#555;--ac:#e8ff00;--teal:#4ecdc4;--pu:#a78bfa;--am:#f59e0b;--co:#ff6b6b;--gr:#6fcf97}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overscroll-behavior:none}
.app{max-width:660px;margin:0 auto;padding:0 0 80px}
.hdr{padding:12px 14px 10px;border-bottom:1px solid var(--br);background:var(--bg);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:baseline;gap:10px;margin-bottom:9px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--ac)}
.sub{font-size:10px;color:var(--mu)}
.tabs{display:flex;gap:4px}
.tab{flex:1;padding:7px 4px;text-align:center;border:1px solid var(--br);border-radius:7px;cursor:pointer;background:var(--s1);color:var(--mu);font-size:10px;transition:all .15s;user-select:none}
.tab b{display:block;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--tx)}
.tab.active{background:var(--ac);border-color:var(--ac)}
.tab.active,.tab.active b{color:#000}
.prog-wrap{padding:8px 14px 0}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--mu);margin-bottom:4px}
.prog-bar{height:2px;background:var(--br);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.day{display:none;padding:10px 14px 0}
.day.active{display:block}
.day-hdr{margin-bottom:9px}
.day-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.day-focus{font-size:10px;color:var(--mu)}

/* CARD */
.card{background:var(--s1);border:1px solid var(--br);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:opacity .2s}
.card.done{opacity:.45}
.card-top{display:flex}

/* MUSCLE DIAGRAM (main visual) */
.mv{width:72px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:8px 5px;background:var(--s2);border-right:1px solid var(--br)}
.mv svg{width:52px;height:78px}

/* INFO */
.ci{flex:1;padding:9px 10px;min-width:0}
.ci-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.ex-name{font-weight:600;font-size:13px;line-height:1.2}
.ex-mus{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.done-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--br);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.done-btn.on{background:var(--ac);border-color:var(--ac);color:#000}
.warn{display:inline-flex;align-items:center;gap:3px;background:#1f1500;border:1px solid #3d2800;border-radius:4px;padding:1px 5px;font-size:9px;color:var(--am);margin-bottom:5px}

/* SET TABLE */
.set-head{display:grid;grid-template-columns:24px 1fr 1fr 24px;gap:4px;margin-bottom:3px}
.set-head span{font-size:9px;color:var(--mu);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.set-head span:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 24px;gap:4px;align-items:center;margin-bottom:3px}
.set-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--mu)}
.set-in{background:var(--s2);border:1px solid var(--br);border-radius:5px;padding:4px 3px;font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);width:100%;text-align:center;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.set-in::-webkit-inner-spin-button,.set-in::-webkit-outer-spin-button{-webkit-appearance:none}
.set-in:focus{border-color:var(--ac)}
.set-in.done-set{border-color:#1e2e1e;background:#0e160e;color:#444}
.set-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--br);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.set-chk.on{background:var(--ac);border-color:var(--ac);color:#000}

/* ACTIONS */
.card-actions{display:flex;align-items:center;gap:5px;padding:5px 10px 8px;flex-wrap:wrap;border-top:1px solid var(--br)}
.timer-btn{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid #3a5500;background:#1a2a00;color:var(--ac);transition:all .15s;white-space:nowrap}
.timer-btn.running{background:#2a1500;border-color:#5a3000;color:var(--am)}
.timer-btn.urgent{background:#2a0000;border-color:#5a0000;color:var(--co);animation:pulse .5s infinite alternate}
.timer-btn.done-t{background:#0a2a0a;border-color:#1a5a1a;color:var(--gr)}
.act-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--br);background:var(--s2);color:var(--mu);transition:all .15s;white-space:nowrap}
.act-btn:hover,.act-btn.open{color:var(--tx);border-color:#555}
.swap-btn{font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid #2a2a4a;background:#0e0e20;color:#7070cc;transition:all .15s}
.swap-btn:hover{border-color:#5555aa;color:#aaaaff}
.remove-btn{font-size:10px;padding:3px 6px;border-radius:5px;cursor:pointer;border:1px solid #3a1515;background:#1a0a0a;color:#884444;transition:all .15s;margin-left:auto}
.remove-btn:hover{color:var(--co);border-color:var(--co)}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

/* TECHNIEK SECTIE (stick figure + notes) */
.nt-body{display:none;border-top:1px solid var(--br);padding:10px 12px}
.nt-body.open{display:block}
.nt-inner{display:flex;gap:12px;align-items:flex-start}
.nt-fig{flex-shrink:0;background:var(--s2);border-radius:8px;padding:8px;width:90px;display:flex;align-items:center;justify-content:center}
.nt-fig svg{width:70px;height:70px}
.nt-text{font-size:12px;color:#999;line-height:1.65;flex:1}

/* COMMENT */
.comment-in{width:100%;background:transparent;border:none;border-top:1px solid var(--br);padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:11px;color:#888;resize:none;outline:none;line-height:1.4;min-height:28px;overflow:hidden}
.comment-in:focus{color:var(--tx)}
.comment-in::placeholder{color:#2e2e2e}

/* ADD EXERCISE BTN */
.add-ex-btn{width:100%;padding:11px;border:2px dashed #2a2a2a;border-radius:10px;background:transparent;color:var(--mu);font-size:13px;cursor:pointer;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.add-ex-btn:hover{border-color:#4a4a4a;color:var(--tx)}
.add-ex-plus{font-size:20px;line-height:1;color:var(--ac)}

/* CARDIO */
.cardio{background:#0a190a;border:1px solid #1d3a1d;border-radius:10px;padding:10px 13px;margin-top:8px;display:flex;align-items:center;gap:10px}
.cardio-ic{font-size:18px;flex-shrink:0}
.cardio-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--gr);font-weight:600;margin-bottom:1px}
.cardio-tx{color:#aaa;font-size:11px}

/* TIMER */
.timer-ov{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:2px solid var(--br);border-radius:14px;padding:12px 22px;z-index:200;text-align:center;min-width:160px;box-shadow:0 6px 32px #000c}
.timer-ov.show{display:block}
.t-big{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:2px;line-height:1;color:var(--ac);transition:color .3s}
.t-big.urg{color:var(--co)}.t-big.klaar{color:var(--gr)}
.t-lbl{font-size:10px;color:var(--mu);margin-top:1px}
.t-stop{margin-top:7px;font-size:10px;color:var(--mu);cursor:pointer;background:none;border:none;text-decoration:underline}

/* DB MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:#000b;z-index:100}
.modal-bg.show{display:block}
.modal{position:fixed;bottom:0;left:0;right:0;max-height:88vh;background:var(--s1);border-radius:16px 16px 0 0;z-index:101;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s ease}
.modal.show{transform:translateY(0)}
.modal-hdr{padding:12px 16px 8px;border-bottom:1px solid var(--br);flex-shrink:0;position:relative}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}
.modal-sub{font-size:10px;color:var(--mu)}
.modal-close{position:absolute;top:12px;right:14px;font-size:20px;cursor:pointer;color:var(--mu);background:none;border:none;line-height:1}
.cat-tabs{display:flex;gap:4px;overflow-x:auto;padding:8px 14px;flex-shrink:0;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex-shrink:0;padding:4px 10px;border-radius:20px;border:1px solid var(--br);font-size:10px;cursor:pointer;background:var(--s2);color:var(--mu);transition:all .15s;white-space:nowrap}
.cat-tab.active{background:var(--ac);border-color:var(--ac);color:#000;font-weight:600}
.ex-list{overflow-y:auto;flex:1;padding:4px 14px 20px}
.ex-db-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1e1e1e;cursor:pointer;transition:all .15s}
.ex-db-item:hover .ex-db-name{color:var(--ac)}
.ex-db-il{width:44px;height:44px;flex-shrink:0;background:var(--s2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.ex-db-il svg{width:36px;height:36px}
.ex-db-name{font-size:13px;font-weight:500;transition:color .15s}
.ex-db-meta{font-size:10px;color:var(--mu)}
.ex-db-item.current .ex-db-name{color:var(--ac)}
.ex-db-item.current{background:#161600;margin:0 -14px;padding:9px 14px}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="hdr-row"><div class="logo">GYM LOG</div><div class="sub">sets · reps · gewicht opgeslagen</div></div>
  <div class="tabs">
    <div class="tab active" onclick="sw(0)"><b>MA</b>Pull+Armen</div>
    <div class="tab" onclick="sw(1)"><b>WO</b>Push+Armen</div>
    <div class="tab" onclick="sw(2)"><b>VR</b>Full Body</div>
  </div>
</div>
<div class="prog-wrap">
  <div class="prog-row"><span id="pt">0 / 0 sets gedaan</span><span id="pp">0%</span></div>
  <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
</div>
<div id="d0" class="day active"></div>
<div id="d1" class="day"></div>
<div id="d2" class="day"></div>
</div>

<div class="timer-ov" id="tOv">
  <div class="t-big" id="tBig">40</div>
  <div class="t-lbl" id="tLbl">seconden rust</div>
  <button class="t-stop" onclick="cancelTimer()">annuleer</button>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-hdr">
    <div class="modal-title" id="modalTitle">Oefening wisselen</div>
    <div class="modal-sub" id="modalSub"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div class="ex-list" id="exList"></div>
</div>

<script>
// ── MUSCLE DIAGRAM (main visual) ────────────────────────────
const MC={back:'#4ecdc4',lats:'#4ecdc4',rotator:'#e8ff00',shoulder:'#e8ff00',rearDelt:'#e8ff00',bicep:'#a78bfa',tricep:'#f59e0b',chest:'#ff6b6b',quads:'#6fcf97',hamstrings:'#6fcf97',core:'#f97316'};

function muscleSvg(g){
  const c=MC[g]||'#888';
  const H={
    back:`<rect x="22" y="24" width="27" height="20" rx="4" fill="${c}" opacity=".85"/>`,
    lats:`<path d="M22 30 L24 53 L29 53 L28 30Z" fill="${c}" opacity=".85"/><path d="M49 30 L47 53 L42 53 L43 30Z" fill="${c}" opacity=".85"/>`,
    rotator:`<circle cx="21" cy="26" r="6" fill="${c}" opacity=".9"/><circle cx="50" cy="26" r="6" fill="${c}" opacity=".9"/>`,
    shoulder:`<ellipse cx="15" cy="29" rx="6" ry="8" fill="${c}" opacity=".9"/><ellipse cx="56" cy="29" rx="6" ry="8" fill="${c}" opacity=".9"/>`,
    rearDelt:`<ellipse cx="15" cy="29" rx="6" ry="8" fill="${c}" opacity=".9"/><ellipse cx="56" cy="29" rx="6" ry="8" fill="${c}" opacity=".9"/>`,
    bicep:`<rect x="10" y="26" width="11" height="13" rx="5" fill="${c}" opacity=".9"/><rect x="50" y="26" width="11" height="13" rx="5" fill="${c}" opacity=".9"/>`,
    tricep:`<rect x="10" y="30" width="11" height="13" rx="5" fill="${c}" opacity=".9"/><rect x="50" y="30" width="11" height="13" rx="5" fill="${c}" opacity=".9"/>`,
    chest:`<path d="M23 24 L36 24 L36 43 L24 41Z" fill="${c}" opacity=".85"/><path d="M36 24 L48 24 L47 41 L36 43Z" fill="${c}" opacity=".85"/>`,
    quads:`<rect x="22" y="58" width="13" height="21" rx="5" fill="${c}" opacity=".9"/><rect x="36" y="58" width="13" height="21" rx="5" fill="${c}" opacity=".9"/>`,
    hamstrings:`<rect x="22" y="60" width="13" height="18" rx="5" fill="${c}" opacity=".9"/><rect x="36" y="60" width="13" height="18" rx="5" fill="${c}" opacity=".9"/>`,
    core:`<rect x="27" y="41" width="17" height="13" rx="3" fill="${c}" opacity=".9"/>`,
  };
  return `<svg viewBox="0 0 71 110" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 5px ${c}66)">
    <circle cx="35" cy="9" r="8" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1.2"/>
    <rect x="31" y="16" width="9" height="7" rx="2" fill="#1a1a1a" stroke="#2d2d2d" stroke-width=".8"/>
    <path d="M21 23 L50 23 L47 56 L24 56Z" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="10" y="23" width="11" height="24" rx="5" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="50" y="23" width="11" height="24" rx="5" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="11" y="48" width="9" height="18" rx="4" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="51" y="48" width="9" height="18" rx="4" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="22" y="57" width="13" height="26" rx="5" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="36" y="57" width="13" height="26" rx="5" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="23" y="84" width="11" height="22" rx="4" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    <rect x="37" y="84" width="11" height="22" rx="4" fill="#1a1a1a" stroke="#2d2d2d" stroke-width="1"/>
    ${H[g]||''}
  </svg>`;
}

// ── EXERCISE STICK FIGURES (in techniek panel) ───────────────
function exSvg(type, muscle){
  const c=MC[muscle]||'#888';
  const sk='#3a3a3a';const sw=3;const sw2=2.5;
  const mkArr=`<defs><marker id="arw" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="${c}"/></marker></defs>`;
  const poses={
    curl:`${mkArr}
      <circle cx="40" cy="12" r="8" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="20" x2="40" y2="50" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="28" x2="58" y2="28" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="22" y1="28" x2="17" y2="50" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="58" y1="28" x2="62" y2="46" stroke="${c}" stroke-width="${sw}"/>
      <line x1="62" y1="46" x2="55" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <rect x="48" y="24" width="14" height="5" rx="2.5" fill="${c}"/>
      <line x1="33" y1="50" x2="47" y2="50" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="36" y1="50" x2="30" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="44" y1="50" x2="50" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M66 42 Q73 33 66 24" fill="none" stroke="${c}" stroke-width="2.5" marker-end="url(#arw)"/>`,
    pushdown:`${mkArr}
      <circle cx="40" cy="12" r="8" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="20" x2="40" y2="50" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="28" x2="58" y2="28" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="22" y1="28" x2="17" y2="50" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="58" y1="28" x2="61" y2="45" stroke="${c}" stroke-width="${sw}"/>
      <line x1="61" y1="45" x2="57" y2="62" stroke="${c}" stroke-width="${sw}"/>
      <rect x="49" y="59" width="16" height="5" rx="2.5" fill="${c}"/>
      <line x1="33" y1="50" x2="47" y2="50" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="36" y1="50" x2="30" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="44" y1="50" x2="50" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M65 48 L65 62" fill="none" stroke="${c}" stroke-width="2.5" marker-end="url(#arw)"/>`,
    row:`${mkArr}
      <circle cx="22" cy="20" r="8" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="28" x2="32" y2="55" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="13" y1="36" x2="32" y2="36" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="32" y1="36" x2="58" y2="30" stroke="${c}" stroke-width="${sw}"/>
      <rect x="55" y="25" width="16" height="6" rx="3" fill="${c}"/>
      <line x1="13" y1="36" x2="8" y2="58" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="30" y1="55" x2="25" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="34" y1="55" x2="40" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M60 30 L46 30" fill="none" stroke="${c}" stroke-width="2.5" marker-end="url(#arw)"/>`,
    pulldown:`${mkArr}
      <circle cx="40" cy="15" r="8" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="23" x2="40" y2="54" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="18" y1="10" x2="62" y2="10" stroke="${c}" stroke-width="${sw}"/>
      <line x1="18" y1="10" x2="25" y2="31" stroke="${c}" stroke-width="${sw}"/>
      <line x1="62" y1="10" x2="55" y2="31" stroke="${c}" stroke-width="${sw}"/>
      <line x1="23" y1="31" x2="57" y2="31" stroke="${c}" stroke-width="${sw2}"/>
      <line x1="31" y1="54" x2="25" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="49" y1="54" x2="55" y2="75" stroke="${sk}" stroke-width="${sw2}"/>
      <path d="M40 8 L40 20" fill="none" stroke="${c}" stroke-width="2.5" marker-end="url(#arw)"/>`,
    press:`${mkArr}
      <circle cx="40" cy="66" r="7" fill="none" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="40" y1="59" x2="40" y2="36" stroke="${sk}" stroke-width="${sw}"/>
      <line x1="22" y1="46" x2="58" y2="46" stroke="${sk}" stroke-width="${sw2}"/>
      <line x1="22" y1="46" x2="15" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="58" y1="46" x2="65" y2="28" stroke="${c}" stroke-width="${sw}"/>
      <line x1="9" y1="24" x2="71" y2="24" stroke="${c}" stroke-width="${sw}"/>
      <path d="M22 42 L22 28" fill="none" stroke="${c}" stroke-width="2.5" marker-end="url(#arw)"/>`,
    lateral:`${mkArr}
      <circle cx="40" cy="12" r="8" fill="none" stroke="${sk}" stroke-width="${sw}"/>

    {id:'db_abwheel',name:'Ab Wheel',type:'plank',muscle:'core',ml:'Core',sets:3,reps:'8–12',notes:'Vanuit knieën beginnen. Zo ver uitrollen als rug stabiel blijft. Traag terug.'},
    {id:'db_crunch',name:'Cable Crunch',type:'row',muscle:'core',ml:'Core',sets:3,reps:'12–15',notes:'Hoge kabel. Knieën op de grond. Ellebogen naar de knieën. Core, niet nek.'},
    {id:'db_hangknee',name:'Hanging Knee Raise',type:'pulldown',muscle:'core',ml:'Core',sets:3,reps:'12–15',notes:'Volledig hangen. Knieën naar borst. Heupen niet slingeren.'},
    {id:'db_russtw',name:'Russian Twist',type:'rotation',muscle:'core',ml:'Core (rotatie)',sets:3,reps:'20',notes:'Voeten omhoog. Romp 45°. Heen en weer draaien. Gewicht optioneel.'},
    {id:'db_birddog',name:'Bird Dog',type:'plank',muscle:'core',ml:'Core',sets:3,reps:'10/kant',notes:'Op handen en knieën. Arm en been uitstrekken tegelijk. Stabiel blijven.'},
  ],
};

const EXMAP={};
Object.values(DB).forEach(list=>list.forEach(ex=>{EXMAP[ex.id]=ex}));
const CAT_LABELS={rug:'Rug',borst:'Borst',schouders:'Schouders',bicep:'Bicep',tricep:'Tricep',benen:'Benen',core:'Core'};

// ── DEFAULT ROUTINE ─────────────────────────────────────────
const DEFAULT_ROUTINE=[
  {title:'Maandag',focus:'Pull + Armen',cardio:'Bike intervals — 4 min (20s hard / 10s rustig)',
    exercises:['db_chestrow','db_latneutral','db_extrot','db_facepull','db_legpress','db_cablecurl','db_ropepush']},
  {title:'Woensdag',focus:'Push (schoudervriendelijk) + Armen',cardio:'Incline walk (15%, 5.5 km/u) of fiets — 4 min',
    exercises:['db_cablepress','db_floorpress','db_cablateral','db_pallof','db_hammercurl','db_1armpush']},
  {title:'Vrijdag',focus:'Full Body Light + Armen',cardio:'Cardio finisher vrij te kiezen — 4 min',
    exercises:['db_rdl','db_cablerow','db_landmine','db_revdeck','db_legcurl','db_preacher','db_ropepush']},
];

// ── STATE ───────────────────────────────────────────────────
let cur=0;
let routine=JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
let setLog={};
let comments={};
let tIv=null,tSec=0,tExId=null;
const TSEC=40;
let modalMode='swap'; // 'swap' or 'add'
let swapTarget={di:0,pos:0};
let activeCat='rug';

// ── STORAGE ─────────────────────────────────────────────────
function load(){
  try{const r=localStorage.getItem('gym_routine_v6');if(r)routine=JSON.parse(r)}catch(e){}
  try{const r=localStorage.getItem('gym_sets_v6');if(r)setLog=JSON.parse(r)}catch(e){}
  try{const r=localStorage.getItem('gym_cmts_v6');if(r)comments=JSON.parse(r)}catch(e){}
}
function saveRoutine(){try{localStorage.setItem('gym_routine_v6',JSON.stringify(routine))}catch(e){}}
function saveSets(){try{localStorage.setItem('gym_sets_v6',JSON.stringify(setLog))}catch(e){}}
function saveCmts(){try{localStorage.setItem('gym_cmts_v6',JSON.stringify(comments))}catch(e){}}

// ── TIMER ────────────────────────────────────────────────────
function startTimer(exId){
  if(tIv&&tExId===exId){cancelTimer();return}
  cancelTimer();tExId=exId;tSec=TSEC;
  setTBtn(exId,'run');showOv();
  tIv=setInterval(()=>{
    tSec--;
    setTBtn(exId,tSec>0?(tSec<=10?'urg':'run'):'done-t');
    showOv();
    if(tSec<=0){
      clearInterval(tIv);tIv=null;
      if(navigator.vibrate)navigator.vibrate([300,100,300]);
      setTimeout(()=>{document.getElementById('tOv').classList.remove('show');setTBtn(exId,'idle');tExId=null},2200);
    }
  },1000);
}
function cancelTimer(){
  if(tIv){clearInterval(tIv);tIv=null}
  document.getElementById('tOv').classList.remove('show');
  if(tExId){setTBtn(tExId,'idle');tExId=null}
}
function showOv(){
  const ov=document.getElementById('tOv'),big=document.getElementById('tBig'),lbl=document.getElementById('tLbl');
  ov.classList.add('show');
  if(tSec<=0){big.textContent='GO!';big.className='t-big klaar';lbl.textContent='rust klaar!';ov.style.borderColor='var(--gr)'}
  else{big.textContent=tSec;big.className='t-big'+(tSec<=10?' urg':'');lbl.textContent='seconden rust';ov.style.borderColor=tSec<=10?'var(--co)':'var(--br)'}
}
function setTBtn(id,state){
  const b=document.getElementById('tbtn-'+id);if(!b)return;
  b.className='timer-btn'+(state==='run'?' running':state==='urg'?' running urgent':state==='done-t'?' done-t':'');
  b.textContent=state==='idle'?'⏱ 40s':state==='done-t'?'✓ klaar':'⏱ '+tSec+'s';
}

// ── RENDER ───────────────────────────────────────────────────
function renderAll(){[0,1,2].forEach(i=>renderDay(i));upd()}

function renderDay(di){
  const day=routine[di];
  const el=document.getElementById('d'+di);
  let h=`<div class="day-hdr"><div class="day-title">${day.title}</div><div class="day-focus">${day.focus}</div></div>`;
  day.exercises.forEach((exId,pos)=>{
    const ex=EXMAP[exId];if(!ex)return;
    h+=renderCard(ex,di,pos);
  });
  h+=`
    <button class="add-ex-btn" onclick="openModal('add',${di},${day.exercises.length})">
      <span class="add-ex-plus">+</span> Oefening toevoegen
    </button>
    <div class="cardio"><div class="cardio-ic">🔥</div><div><div class="cardio-lbl">Cardio</div><div class="cardio-tx">${day.cardio}</div></div></div>`;
  el.innerHTML=h;
  el.querySelectorAll('.comment-in').forEach(t=>{if(t.value)ar(t)});
}

function renderCard(ex,di,pos){
  const cmt=comments[`${di}_${ex.id}`]||'';
  const sets=ex.sets;
  let allDone=true;
  let setRows=`<div class="set-head"><span>#</span><span>Gewicht</span><span>Reps</span><span></span></div>`;
  for(let si=0;si<sets;si++){
    const key=`${di}_${ex.id}_${si}`;
    const sd=setLog[key]||{w:'',r:'',done:false};
    if(!sd.done)allDone=false;
    setRows+=`<div class="set-row">
      <span class="set-num">${si+1}</span>
      <input class="set-in${sd.done?' done-set':''}" type="number" min="0" step="2.5" placeholder="kg" value="${sd.w}" oninput="onSetW(${di},'${ex.id}',${si},this.value)"/>
      <input class="set-in${sd.done?' done-set':''}" type="number" min="0" step="1" placeholder="reps" value="${sd.r}" oninput="onSetR(${di},'${ex.id}',${si},this.value)"/>
      <button class="set-chk${sd.done?' on':''}" onclick="toggleSet(${di},'${ex.id}',${si})">${sd.done?'✓':''}</button>
    </div>`;
  }
  return `<div class="card${allDone?' done':''}" id="card-${di}-${ex.id}">
    <div class="card-top">
      <div class="mv">${muscleSvg(ex.muscle)}</div>
      <div class="ci">
        <div class="ci-head">
          <div>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-mus">${ex.ml} · ${ex.sets}×${ex.reps}</div>
          </div>
          <button class="done-btn${allDone?' on':''}" onclick="toggleAllSets(${di},'${ex.id}',${ex.sets})">${allDone?'✓':'○'}</button>
        </div>
        ${ex.warn?`<div class="warn">⚠ ${ex.warn}</div>`:''}
        <div class="set-table">${setRows}</div>
      </div>
    </div>
    <div class="card-actions">
      <button class="timer-btn" id="tbtn-${ex.id}" onclick="startTimer('${ex.id}')">⏱ 40s</button>
      <button class="act-btn" onclick="tNt('nt-${di}-${ex.id}',this)">▸ techniek</button>
      <button class="swap-btn" onclick="openModal('swap',${di},${pos})">↔ wissel</button>
      <button class="remove-btn" onclick="removeEx(${di},${pos})">✕</button>
    </div>
    <div class="nt-body" id="nt-${di}-${ex.id}">
      <div class="nt-inner">
        <div class="nt-fig">${exSvg(ex.type,ex.muscle)}</div>
        <div class="nt-text">${ex.notes}</div>
      </div>
    </div>
    <textarea class="comment-in" placeholder="Opmerking... (bijv: +2.5kg volgende keer, vorm goed)" rows="1"
      oninput="onCmt(${di},'${ex.id}',this.value);ar(this)" onfocus="ar(this)">${cmt}</textarea>
  </div>`;
}

// ── INTERACTIONS ─────────────────────────────────────────────
function sw(i){
  cur=i;
  document.querySelectorAll('.day').forEach((d,j)=>d.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  upd();
}
function onSetW(di,exId,si,v){const k=`${di}_${exId}_${si}`;if(!setLog[k])setLog[k]={w:'',r:'',done:false};setLog[k].w=v;saveSets()}
function onSetR(di,exId,si,v){const k=`${di}_${exId}_${si}`;if(!setLog[k])setLog[k]={w:'',r:'',done:false};setLog[k].r=v;saveSets()}
function toggleSet(di,exId,si){
  const k=`${di}_${exId}_${si}`;
  if(!setLog[k])setLog[k]={w:'',r:'',done:false};
  setLog[k].done=!setLog[k].done;saveSets();renderDay(di);upd();
}
function toggleAllSets(di,exId,sets){
  let allDone=true;
  for(let si=0;si<sets;si++){const k=`${di}_${exId}_${si}`;if(!setLog[k]||!setLog[k].done){allDone=false;break}}
  for(let si=0;si<sets;si++){const k=`${di}_${exId}_${si}`;if(!setLog[k])setLog[k]={w:'',r:'',done:false};setLog[k].done=!allDone}
  saveSets();renderDay(di);upd();
}
function removeEx(di,pos){
  if(!confirm('Oefening verwijderen?'))return;
  routine[di].exercises.splice(pos,1);saveRoutine();renderDay(di);upd();
}
function onCmt(di,exId,v){comments[`${di}_${exId}`]=v;saveCmts()}
function tNt(id,btn){const el=document.getElementById(id);el.classList.toggle('open');btn.textContent=el.classList.contains('open')?'▾ techniek':'▸ techniek'}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}
function upd(){
  let total=0,done=0;
  routine[cur].exercises.forEach(exId=>{
    const ex=EXMAP[exId];if(!ex)return;
    for(let si=0;si<ex.sets;si++){total++;const k=`${cur}_${exId}_${si}`;if(setLog[k]&&setLog[k].done)done++}
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pt').textContent=`${done} / ${total} sets gedaan`;
  document.getElementById('pp').textContent=`${pct}%`;
  document.getElementById('pf').style.width=`${pct}%`;
}

// ── MODAL ───────────────────────────────────────────────────
function openModal(mode,di,pos){
  modalMode=mode;swapTarget={di,pos};
  const curExId=mode==='swap'?routine[di].exercises[pos]:null;
  const curEx=curExId?EXMAP[curExId]:null;
  document.getElementById('modalTitle').textContent=mode==='swap'?'Oefening wisselen':'Oefening toevoegen';
  document.getElementById('modalSub').textContent=mode==='swap'&&curEx?`Vervangt: ${curEx.name}`:'Kies een oefening uit de database';
  let startCat='rug';
  if(curExId)Object.entries(DB).forEach(([cat,list])=>{if(list.find(e=>e.id===curExId))startCat=cat});
  activeCat=startCat;
  renderCatTabs();renderExList();
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('show');
  document.getElementById('modal').classList.remove('show');
}
function renderCatTabs(){
  document.getElementById('catTabs').innerHTML=Object.entries(CAT_LABELS).map(([k,v])=>
    `<div class="cat-tab${activeCat===k?' active':''}" onclick="setCat('${k}')">${v}</div>`
  ).join('');
}
function setCat(cat){activeCat=cat;renderCatTabs();renderExList()}
function renderExList(){
  const curExId=modalMode==='swap'?routine[swapTarget.di].exercises[swapTarget.pos]:null;
  const list=DB[activeCat]||[];
  document.getElementById('exList').innerHTML=list.map(ex=>{
    const isCur=ex.id===curExId;
    return `<div class="ex-db-item${isCur?' current':''}" onclick="doAction('${ex.id}')">
      <div class="ex-db-il">${exSvg(ex.type,ex.muscle)}</div>
      <div>
        <div class="ex-db-name">${ex.name}${isCur?' ✓':''}</div>
        <div class="ex-db-meta">${ex.ml} · ${ex.sets}×${ex.reps}</div>
      </div>
    </div>`;
  }).join('');
}
function doAction(newExId){
  const{di,pos}=swapTarget;
  if(modalMode==='swap'){routine[di].exercises[pos]=newExId}
  else{routine[di].exercises.push(newExId)}
  saveRoutine();closeModal();renderDay(di);upd();
}

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/Bonusbuurt/sw.js'));
load();renderAll();
</script>
</body>
</html>
