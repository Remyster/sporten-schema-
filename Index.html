      payload: payload || {},

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upper Hypertrofie Tracker met RIR</title>
<style>
:root { --bg:#121212; --card:#1e1e1e; --accent:#4caf50; --text:#e0e0e0; --sub:#888; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:10px; }
h1,h2 { color:var(--accent); margin:8px 0; }
.warn { background:#b71c1c; padding:10px; border-radius:8px; margin-bottom:10px; font-size:14px; }
.tabs { display:flex; gap:5px; margin-bottom:10px; }
.tab { flex:1; padding:10px; background:var(--card); border:none; color:var(--text); border-radius:8px; font-weight:600; }
.tab.active { background:var(--accent); color:#000; }
.day { display:none; }
.day.active { display:block; }
.ex { background:var(--card); padding:12px; border-radius:10px; margin-bottom:12px; }
.ex h3 { margin:0 0 8px 0; font-size:16px; }
.set { display:grid; grid-template-columns:30px 1fr 1fr 1fr 50px; gap:6px; align-items:center; margin-bottom:6px; }
.set input, .set select { width:100%; padding:6px; border-radius:6px; border:1px solid #333; background:#2a2a2a; color:var(--text); }
.set input[type=checkbox] { width:20px; height:20px; }
button { background:var(--accent); color:#000; border:none; padding:10px 14px; border-radius:8px; font-weight:600; margin:5px 2px; }
.timer { font-weight:700; color:var(--accent); margin-left:8px; }
.notes { width:100%; min-height:60px; background:#2a2a2a; border:1px solid #333; color:var(--text); border-radius:8px; padding:8px; }
.date { color:var(--sub); font-size:14px; margin-bottom:10px; }
</style>
</head>
<body>
<h1>Upper Hypertrofie Tracker</h1>
<div class="date" id="date"></div>
<div class="warn">⚠️ Stop bij scherpe pijn. Stijf/gevoelig mag. Test eerste 2 weken alles op RIR 3-4. Overleg met fysio bij twijfel.</div>
<div class="tabs">
  <button class="tab active" onclick="showDay('ma')">Ma: Push</button>
  <button class="tab" onclick="showDay('wo')">Wo: Pull</button>
  <button class="tab" onclick="showDay('vr')">Vr: Upper</button>
</div>

<div id="ma" class="day active"></div>
<div id="wo" class="day"></div>
<div id="vr" class="day"></div>

<script>
const schema = {
  ma: [
    {name:"Flat Dumbbell Press", sets:4, reps:"8-10"},
    {name:"Cable Fly Low→High", sets:3, reps:"12-15"},
    {name:"Cable Tricep Pushdown Rope", sets:3, reps:"12-15"},
    {name:"Machine Chest Press neutraal", sets:3, reps:"12-15"},
    {name:"Cable Lateral Raise tot 60°", sets:3, reps:"15-20"},
    {name:"Cable External Rotation", sets:3, reps:"15-20"}
  ],
  wo: [
    {name:"Lat Pulldown Neutrale Grip", sets:4, reps:"8-10"},
    {name:"Chest Supported DB Row", sets:4, reps:"10-12"},
    {name:"Straight Arm Pulldown", sets:3, reps:"12-15"},
    {name:"Face Pull", sets:3, reps:"15-20"},
    {name:"Dumbbell Hammer Curl", sets:3, reps:"10-12"},
    {name:"Cable Curl", sets:2, reps:"12-15"},
    {name:"Cable External Rotation", sets:3, reps:"15-20"}
  ],
  vr: [
    {name:"Dumbbell Floor Press", sets:4, reps:"12-15"},
    {name:"Seated Cable Row Neutraal", sets:4, reps:"12-15"},
    {name:"Pec Deck", sets:3, reps:"15"},
    {name:"OH Cable Tricep Ext <90°", sets:3, reps:"15"},
    {name:"Incline DB Curl 45°", sets:3, reps:"12"},
    {name:"Reverse Grip Pushdown", sets:3, reps:"15"},
    {name:"Plank", sets:3, reps:"45sec"}
  ]
};

function showDay(d){
  document.querySelectorAll('.day').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById(d).classList.add('active');
  event.target.classList.add('active');
}

function build(){
  document.getElementById('date').innerText = new Date().toLocaleDateString('nl-NL', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  for(const dag in schema){
    const cont = document.getElementById(dag);
    schema[dag].forEach((ex,ei)=>{
      let html = `<div class="ex"><h3>${ex.name} <span style="color:var(--sub);font-size:14px;">${ex.reps} reps</span>
        <button onclick="startTimer(this)">⏱ 90s</button><span class="timer"></span></h3>`;
      for(let s=0;s<ex.sets;s++){
        const id = `${dag}-${ei}-${s}`;
        html += `<div class="set">
          <input type="checkbox" id="c${id}" onchange="save('${id}')">
          <input type="number" placeholder="kg" id="k${id}" onchange="save('${id}')">
          <input type="number" placeholder="reps" id="r${id}" onchange="save('${id}')">
          <select id="rir${id}" onchange="save('${id}')">
            <option value="">RIR</option><option>0</option><option>1</option><option>2</option><option>3</option><option>4+</option>
          </select>
          <span style="color:var(--sub);">Set ${s+1}</span>
        </div>`;
      }
      html += `</div>`;
      cont.innerHTML += html;
    });
    cont.innerHTML += `<h3>Notities ${dag.toUpperCase()}</h3><textarea class="notes" id="n${dag}" onchange="save('n${dag}')"></textarea>
      <button onclick="resetDay('${dag}')">Reset ${dag.toUpperCase()}</button>`;
  }
  load();
}

function save(id){
  const v = {
    c:document.getElementById('c'+id)?.checked,
    k:document.getElementById('k'+id)?.value,
    r:document.getElementById('r'+id)?.value,
    rir:document.getElementById('rir'+id)?.value,
    n:document.getElementById(id)?.value
  };
  localStorage.setItem(id, JSON.stringify(v));
}

function load(){
  Object.keys(localStorage).forEach(id=>{
    const v = JSON.parse(localStorage.getItem(id));
    if(document.getElementById('c'+id)) document.getElementById('c'+id).checked = v.c;
    if(document.getElementById('k'+id)) document.getElementById('k'+id).value = v.k;
    if(document.getElementById('r'+id)) document.getElementById('r'+id).value = v.r;
    if(document.getElementById('rir'+id)) document.getElementById('rir'+id).value = v.rir;
    if(document.getElementById(id)) document.getElementById(id).value = v.n;
  });
}

function resetDay(d){
  if(confirm(`Alles van ${d.toUpperCase()} wissen?`)){
    schema[d].forEach((ex,ei)=>{
      for(let s=0;s<ex.sets;s++) localStorage.removeItem(`${d}-${ei}-${s}`);
    });
    localStorage.removeItem('n'+d);
    location.reload();
  }
}

function startTimer(btn){
  let t=90; const span=btn.nextElementSibling; btn.disabled=true;
  const iv=setInterval(()=>{
    span.innerText=` ${t}s`;
    if(t--<=0){clearInterval(iv); span.innerText=' Klaar!'; btn.disabled=false;}
  },1000);
}

build();
</script>
</body>
</html>
